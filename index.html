<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NinjaNursery™ Agent V2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A1F2E;
  --gold: #D4AF37;
  --cream: #F5F0E8;
  --blue: #4A90D9;
  --navy-light: #112840;
  --navy-mid: #0d2a3d;
  --gold-dim: #a8852a;
  --text-muted: #7a9ab5;
  --success: #2ecc71;
  --error: #e74c3c;
  --warning: #f39c12;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--navy);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    radial-gradient(ellipse at 20% 20%, rgba(212,175,55,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(74,144,217,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(10,31,46,0.8) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px; }

header { text-align: center; padding: 20px 20px 15px; position: relative; }
.brand-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  color: var(--navy);
  font-family: 'Cinzel Decorative', serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 4px;
  padding: 6px 20px;
  border-radius: 2px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

header h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 900;
  color: var(--cream);
  line-height: 1.2;
}
header h1 span { color: var(--gold); }
header p { color: var(--text-muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px;}

.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(212,175,55,0.1);
  padding: 12px 20px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 12px;
}
.status-indicator { display: flex; align-items: center; gap: 8px; font-weight: 600; font-family: 'Cinzel Decorative', serif; }
.status-dot-main { width: 10px; height: 10px; border-radius: 50%; background: #7a9ab5; }
.status-dot-main.ready { background: var(--blue); }
.status-dot-main.running { background: var(--gold); animation: pulse 1s infinite; }
.status-dot-main.done { background: var(--success); }

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
  overflow-x: auto;
}
.tab-btn {
  flex: 1;
  padding: 10px 14px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.3s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--cream); background: rgba(255,255,255,0.05); }
.tab-btn.active { background: var(--gold); color: var(--navy); font-weight: 700; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* TWO COLUMN GRID FROM IMAGE */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 20px;
}
@media (max-width: 1024px) {
  .dashboard-grid { grid-template-columns: 1fr; }
}

.card { background: rgba(11, 34, 51, 0.6); border: 1px solid rgba(212,175,55,0.12); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.card-title { font-family: 'Cinzel Decorative', serif; font-size: 12px; color: var(--gold); letter-spacing: 2px; margin-bottom: 14px; text-transform: uppercase;}

/* TOP PIPELINE MINI INDICATORS */
.pipeline-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
.mini-layer { background: rgba(0,0,0,0.2); border: 1px solid rgba(212,175,55,0.1); border-radius: 6px; padding: 10px; text-align: center; font-size: 11px; color: var(--text-muted); }
.mini-layer.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); }
.mini-layer.done { border-color: var(--success); color: var(--success); }

.progress-bar-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 15px; overflow: hidden; }
.progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--blue), var(--gold)); transition: width 0.4s ease; }

.run-section { display: flex; gap: 10px; margin-bottom: 15px; }
.run-btn { flex: 1; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-dim)); border: none; border-radius: 6px; font-family: 'Cinzel Decorative', serif; font-size: 13px; font-weight: 700; color: var(--navy); cursor: pointer; letter-spacing: 2px; }
.run-all-btn { flex: 1; padding: 14px; background: #112840; border: 1px solid var(--blue); border-radius: 6px; font-family: 'Cinzel Decorative', serif; font-size: 13px; color: white; cursor: pointer; letter-spacing: 2px; }

/* AGENTS LIST */
.agent-list { display: flex; flex-direction: column; gap: 8px; }
.agent-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; }
.agent-item.running { border-color: var(--gold); background: rgba(212,175,55,0.05); }
.agent-item.done { border-color: var(--success); }
.agent-name { font-size: 12px; font-weight: 600; }
.agent-role { font-size: 10px; color: var(--text-muted); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); margin-left: auto; }
.agent-item.running .status-dot { background: var(--gold); animation: pulse 1s infinite; }
.agent-item.done .status-dot { background: var(--success); }

/* OPERATIONAL LOG STREAM */
.log-container { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 12px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 11px; line-height: 1.5; }
.log-entry { display: flex; gap: 8px; margin-bottom: 4px; }
.log-time { color: var(--text-muted); }
.log-msg { color: var(--cream); white-space: pre-wrap; }
.log-msg.success { color: var(--success); }
.log-msg.warning { color: var(--warning); }
.log-msg.info { color: var(--blue); }

/* RIGHT PANEL SCORES */
.score-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
.score-item { text-align: center; padding: 10px 5px; background: rgba(0,0,0,0.2); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
.score-value { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--gold); }
.score-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px;}

/* BOXES */
.output-text { background: rgba(0,0,0,0.3); border: 1px solid rgba(212,175,55,0.1); border-radius: 6px; padding: 14px; font-size: 12px; line-height: 1.6; color: var(--cream); white-space: pre-wrap; max-height: 250px; overflow-y: auto; }

/* PLATFORM TABS */
.platform-tabs { display: flex; gap: 6px; margin-bottom: 10px; margin-top: 15px; }
.platform-tab { padding: 6px 12px; border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid rgba(212,175,55,0.2); color: var(--text-muted); background: transparent; text-transform: uppercase;}
.platform-tab.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.platform-content { display: none; }
.platform-content.active { display: block; }

/* PIPELINES LINK STATUS */
.save-status { display: flex; gap: 10px; margin-top: 10px; }
.save-item { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; font-size: 11px; color: var(--text-muted); }
.save-item.done { border-color: var(--success); color: var(--success); }

/* IMAGES */
.image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
.image-card { border-radius: 6px; overflow: hidden; border: 1px solid rgba(212,175,55,0.15); background: rgba(0,0,0,0.3); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; position: relative; }
.image-card img { width: 100%; height: 100%; object-fit: cover; }
.image-card .img-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,31,46,0.9); font-size: 9px; text-align: center; padding: 4px; color: var(--gold); }

.color-swatches { display: flex; gap: 10px; margin: 10px 0; }
.swatch { flex: 1; height: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
.finance-calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.fin-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
.fin-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(212,175,55,0.1); border-radius: 6px; padding: 10px; text-align: center; }
.fin-val { font-size: 18px; font-weight: 700; color: var(--gold); }

.history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.history-table th, .history-table td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(212,175,55,0.1); }
.history-table th { color: var(--gold); font-size: 10px; text-transform: uppercase;}

.settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
.input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.input-group label { font-size: 10px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1px;}
.input-group input { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.2); border-radius: 4px; padding: 10px; color: var(--cream); font-size: 12px; outline: none; }

.notification { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; font-size: 12px; z-index: 1000; transform: translateX(200%); transition: transform 0.3s; }
.notification.show { transform: translateX(0); }
.notification.success { background: rgba(46,204,113,0.2); border: 1px solid var(--success); color: #2ecc71; }
